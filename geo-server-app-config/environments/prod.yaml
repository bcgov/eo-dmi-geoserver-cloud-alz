# Per-environment settings for geoserver-apply.
#
# Values may be literal, or named references:
#   kv://<vault>/<secret>   -> Azure Key Vault (DefaultAzureCredential)
#   tf://<output>           -> terraform -chdir=../stack output <name>

env: prod

# Resolve from Terraform output so we never hand-edit URLs.
gateway_url: tf://gateway_url

admin_user: admin
admin_password: kv://kv-geoserver-prod/geoserver-admin-password

acl:
  base_url: tf://acl_url
  admin_user: admin
  admin_password: kv://kv-geoserver-prod/acl-admin-password

postgis_stores:
  default:
    host: tf://postgres_fqdn
    port: 5432
    database: geodata
    schema: public
    user: gsadmin
    password: kv://kv-geoserver-prod/postgres-password
    ssl: require

http:
  timeout_seconds: 30
  retries: 5
