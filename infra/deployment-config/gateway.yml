# Spring Boot supports externalized YAML and properties configuration, including
# optional imports from additional files at runtime. Keeping these values in a
# mounted deployment config bundle makes the gateway behavior easier to adjust
# per environment without rebuilding the application image.
spring.config.import:
  - optional: geoserver_logging.yml

# These GeoServer and gateway values are intentionally externalized so they can
# be overridden by deployment-time environment variables or mounted files.
geoserver:
  base-path: ${GEOSERVER_BASE_PATH:}
  security:
    gateway-shared-auth:
      enabled: ${GATEWAY_SHARED_AUTH_ENABLED:true}

basepath: ${geoserver.base-path}

targets:
  acl: ${TARGETS_ACL:http://acl:8080}
  wfs: ${TARGETS_WFS:lb://wfs}
  wms: ${TARGETS_WMS:lb://wms}
  wcs: ${TARGETS_WCS:lb://wcs}
  wps: ${TARGETS_WPS:lb://wps}
  rest: ${TARGETS_REST:lb://restconfig}
  gwc: ${TARGETS_GWC:lb://gwc}
  webui: ${TARGETS_WEBUI:lb://webui}
  webui-demo: ${TARGETS_WEBUI_DEMO:lb://webui}

server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types:
      - text/html
      - text/plain
      - text/xml
      - text/css
      - text/javascript
      - application/xml
      - application/json
      - application/geo+json
      - application/gml+xml
      - application/vnd.ogc.wms_xml
      - application/vnd.ogc.se_xml
    min-response-size: 2048

spring:
  threads.virtual.enabled: true
  http:
    clients:
      imperative:
        factory: reactor
      reactive:
        connector: reactor
      connect-timeout: 5s
  cloud:
    gateway:
      actuator:
        verbose:
          enabled: true
      server:
        webmvc:
          http-client:
            connect-timeout: 5s
            read-timeout: 60s
          trusted-proxies: ".*"
          forwarded-request-headers-filter:
            enabled: false
          x-forwarded-request-headers-filter:
            enabled: true
            for-enabled: true
            host-enabled: true
            port-enabled: true
            proto-enabled: true
            prefix-enabled: true
          filter:
            secure-headers:
              enabled: true
              disable:
                - content-security-policy
              frame-options: SAMEORIGIN
              xss-protection-header: "0"
              referrer-policy: same-origin
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "*"
                allowedHeaders: "*"
                allowedMethods: GET, PUT, POST, DELETE, OPTIONS, HEAD
          routes:
            - id: root-redirect-to-webui
              uri: no://op
              predicates:
                - Path=/,${basepath},${basepath}/
              filters:
                - RedirectTo=302, ${basepath}/web/
            - id: acl
              uri: ${targets.acl}
              predicates:
                - Path=${basepath}/acl/**
              filters:
                - StripBasePath=${basepath}
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
                - RewritePath=/acl,/acl/
            - id: wfs
              uri: ${targets.wfs}
              predicates:
                - Path=${basepath}/wfs,${basepath}/{workspace}/wfs,${basepath}/{workspace}/{layer}/wfs,${basepath}/schemas/wfs/**,${basepath}/webresources/wfs/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: wms
              uri: ${targets.wms}
              predicates:
                - Path=${basepath}/wms,${basepath}/{workspace}/wms,${basepath}/{workspace}/{layer}/wms,${basepath}/schemas/wms/**,${basepath}/openlayers/**,${basepath}/openlayers3/**,${basepath}/openlayers10/**,${basepath}/webresources/wms/**,${basepath}/options.png
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: wcs
              uri: ${targets.wcs}
              predicates:
                - Path=${basepath}/wcs,${basepath}/{workspace}/wcs,${basepath}/{workspace}/{layer}/wcs,${basepath}/schemas/wcs/**,${basepath}/webresources/wcs/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: wps
              uri: ${targets.wps}
              predicates:
                - Path=${basepath}/wps,${basepath}/{workspace}/wps,${basepath}/schemas/wps/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: rest
              uri: ${targets.rest}
              predicates:
                - Path=${basepath}/rest/**,${basepath}/api/**,${basepath}/ows/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: gwc
              uri: ${targets.gwc}
              predicates:
                - Path=${basepath}/gwc/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
            - id: webui
              uri: ${targets.webui}
              predicates:
                - Path=${basepath}/web/**,${basepath}/webresources/**
              filters:
                - StripBasePath=${basepath}
                - SharedAuth
                - SecureHeaders
                - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
